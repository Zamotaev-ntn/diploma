<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Управление тестами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Список тестов</h1>
      <div class="mb-3">
        <a href="{{ url_for('admin_tests_create') }}" class="btn btn-primary">Добавить тест</a>
        <a href="{{ url_for('admin') }}" class="btn btn-secondary">Назад в админку</a>
      </div>
      <table class="table table-bordered bg-white">
        <thead>
          <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          {% for test in tests %}
          <tr>
            <td>{{ test.title }}</td>
            <td>{{ test.description or '-' }}</td>
            <td>
              <a href="{{ url_for('admin_test_questions', test_id=test.id) }}" class="btn btn-sm btn-info">Вопросы</a>
              <a href="{{ url_for('admin_tests_delete', test_id=test.id) }}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="3" class="text-center">Тестов пока нет</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
