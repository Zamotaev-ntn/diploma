<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админская панель</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #333;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 60px auto;
        padding: 24px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 28px;
        color: #c0392b;
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        background: #c0392b;
        color: white;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
      }
      .info-section {
        margin-bottom: 24px;
        margin-top: 24px;
      }
      .info-row {
        margin-bottom: 12px;
        padding: 12px;
        background: #f9f9f9;
        border-radius: 6px;
      }
      .info-label {
        font-weight: 600;
        color: #666;
        font-size: 14px;
      }
      .info-value {
        font-size: 16px;
        color: #333;
        margin-top: 4px;
      }
      .actions {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #eee;
      }
      .btn {
        display: inline-block;
        padding: 10px 24px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 15px;
        margin-right: 10px;
      }
      .btn-primary {
        background: #2d6cdf;
        color: white;
      }
      .btn-primary:hover {
        background: #2357b3;
      }
      .btn-secondary {
        background: #95a5a6;
        color: white;
      }
      .btn-secondary:hover {
        background: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Админская панель <span class="badge">АДМИНИСТРАТОР</span></h1>

      <div class="info-section">
        <div class="info-row">
          <div class="info-label">Email администратора</div>
          <div class="info-value">{{ user.email }}</div>
        </div>
      </div>

      <p>Добро пожаловать в административную панель. Здесь вы можете управлять системой.</p>

      <div class="actions">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">На главную</a>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">На дашборд</a>
        <a href="{{ url_for('admin_tests') }}" class="btn btn-primary">Управление тестами</a>
      </div>
    </div>
  </body>
</html>
