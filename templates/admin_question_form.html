<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if question %}Редактировать{% else %}Создать{% endif %} вопрос</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">{% if question %}Редактировать{% else %}Создать{% endif %} вопрос</h1>
      <p class="text-muted">Тест: {{ test.title }}</p>
      
      <form method="POST" class="bg-white p-4 rounded shadow-sm" style="max-width: 800px;">
        <div class="mb-3">
          <label class="form-label">Текст вопроса</label>
          <textarea name="question_text" class="form-control" rows="4" required>{% if question %}{{ question.text }}{% endif %}</textarea>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Тип вопроса</label>
          <select name="question_type" class="form-select" required>
            <option value="">-- Выберите тип --</option>
            <option value="single" {% if question and question.question_type == 'single' %}selected{% endif %}>Один ответ</option>
            <option value="multiple" {% if question and question.question_type == 'multiple' %}selected{% endif %}>Несколько ответов</option>
            <option value="text" {% if question and question.question_type == 'text' %}selected{% endif %}>Текстовый ответ</option>
            <option value="scale" {% if question and question.question_type == 'scale' %}selected{% endif %}>Шкала</option>
          </select>
        </div>
        
        <div class="mb-3" id="options-field" style="display: none;">
          <label class="form-label">Варианты ответов</label>
          <small class="d-block text-muted mb-2">Каждый вариант с новой строки</small>
          <textarea name="options_text" class="form-control" rows="6">{{ options_text or '' }}</textarea>
        </div>
        
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">Сохранить</button>
          <a href="{{ url_for('admin_test_questions', test_id=test.id) }}" class="btn btn-secondary">Отмена</a>
        </div>
      </form>
    </div>
    
    <script>
      const typeSelect = document.querySelector('select[name="question_type"]');
      const optionsField = document.getElementById('options-field');
      
      function updateOptionsVisibility() {
        const type = typeSelect.value;
        if (type === 'single' || type === 'multiple') {
          optionsField.style.display = 'block';
        } else {
          optionsField.style.display = 'none';
        }
      }
      
      typeSelect.addEventListener('change', updateOptionsVisibility);
      updateOptionsVisibility();
    </script>
  </body>
</html>
