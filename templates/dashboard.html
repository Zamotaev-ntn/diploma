<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Кабинет пользователя</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #333;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 60px auto;
        padding: 24px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 28px;
        color: #2d6cdf;
      }
      .info-section {
        margin-bottom: 24px;
      }
      .info-row {
        margin-bottom: 12px;
        padding: 12px;
        background: #f9f9f9;
        border-radius: 6px;
      }
      .info-label {
        font-weight: 600;
        color: #666;
        font-size: 14px;
      }
      .info-value {
        font-size: 16px;
        color: #333;
        margin-top: 4px;
      }
      .actions {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #eee;
      }
      .btn {
        display: inline-block;
        padding: 10px 24px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 15px;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background: #2d6cdf;
        color: white;
      }
      .btn-primary:hover {
        background: #2357b3;
      }
      .btn-admin {
        background: #c0392b;
        color: white;
      }
      .btn-admin:hover {
        background: #a93226;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Добро пожаловать!</h1>

      <div class="info-section">

        <div class="info-row">
          <div class="info-label">Email</div>
          <div class="info-value">{{ user.email }}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Роль</div>
          <div class="info-value">{{ user.role or "не указана" }}</div>
        </div>
      </div>

      <div class="actions">
        <a href="{{ url_for('user_tests') }}" class="btn btn-primary">Тесты</a>
        <a href="{{ url_for('my_results') }}" class="btn btn-primary">Мои результаты</a>
        {% if user.is_admin() %}
          <a href="{{ url_for('admin') }}" class="btn btn-admin">Админ-панель</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="btn btn-logout">Выход</a>
      </div>
    </div>
  </body>
</html>
