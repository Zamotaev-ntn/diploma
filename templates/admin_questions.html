<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вопросы теста</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Вопросы теста «{{ test.title }}»</h1>
      <div class="mb-3">
        <a href="{{ url_for('admin_tests') }}" class="btn btn-secondary">Назад к тестам</a>
        <a href="#" class="btn btn-primary">Добавить вопрос</a>
      </div>
      <table class="table table-bordered bg-white">
        <thead>
          <tr>
            <th>Текст</th>
            <th>Тип</th>
            <th>Варианты</th>
          </tr>
        </thead>
        <tbody>
          {% for question in questions %}
          <tr>
            <td>{{ question.text }}</td>
            <td>{{ question.question_type }}</td>
            <td>{{ question.options or '-' }}</td>
          </tr>
          {% else %}
          <tr>
            <td colspan="3" class="text-center">Вопросов пока нет</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
